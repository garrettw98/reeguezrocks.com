<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reeguez Rocks 2026</title>

    <!-- Icons and preview image -->
    <link rel="icon" href="RR26Logo.png" type="image/png">
    <link rel="shortcut icon" href="RR26Logo.png" type="image/png">
    <link rel="apple-touch-icon" href="RR26Logo.png" sizes="180x180">
    <meta name="theme-color" content="#0a0a0f">

    <!-- Open Graph -->
    <meta property="og:title" content="Reeguez Rocks 2026">
    <meta name="description" content="Coming Soon — Underground bass festival at Camp Tahquitz, San Bernardino National Forest.">
    <meta property="og:description" content="Coming Soon — Underground bass festival at Camp Tahquitz, San Bernardino National Forest.">
    <meta property="og:image" content="https://reeguezrocks.com/RR26Logo.png">
    <meta property="og:url" content="https://reeguezrocks.com">
    <meta property="og:type" content="website">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --color-bg: #0a0a0f;
            --color-text: #f5f5f5;
            --color-text-muted: #a0a0a0;
            --color-accent: #f7a602;
        }

        html {
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            min-height: 100dvh;
            padding: 2rem;
            text-align: center;
            position: relative;
        }

        .bg-layer {
            position: fixed;
            top: -50px;
            left: -50px;
            right: -50px;
            bottom: -50px;
            background-image: url('RR26BG.png');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        .bg-overlay {
            position: fixed;
            top: -50px;
            left: -50px;
            right: -50px;
            bottom: -50px;
            background: rgba(10, 10, 15, 0.85);
            z-index: -1;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
        }

        .logo {
            width: 100%;
            max-width: 400px;
            height: auto;
            margin-bottom: 2.5rem;
            filter: drop-shadow(0 0 40px rgba(247, 166, 2, 0.3));
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 600;
            color: var(--color-accent);
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.1rem;
            color: var(--color-text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .instagram-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .instagram-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(225, 48, 108, 0.4);
        }

        .instagram-btn svg {
            width: 20px;
            height: 20px;
        }

        .preview-link {
            display: block;
            margin-top: 1.5rem;
            color: var(--color-text-muted);
            font-size: 0.875rem;
            text-decoration: none;
            opacity: 0.7;
            transition: opacity 0.2s, color 0.2s;
        }

        .preview-link:hover {
            opacity: 1;
            color: var(--color-accent);
        }

        .footer {
            position: fixed;
            bottom: 1.5rem;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.875rem;
            color: var(--color-text-muted);
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="bg-overlay"></div>

    <div class="container">
        <img src="assets/reeguez-rocks-2026-logo.png" alt="Reeguez Rocks 2026" class="logo">

        <h1>Under Construction</h1>
        <p>Nothing is finalized yet — we're still building the plan to make Reeguez Rocks 2026 bigger than ever! Follow us on Instagram to stay in the loop and help shape the festival.</p>

        <a href="https://www.instagram.com/reeguez_rocks_festival/" class="instagram-btn" target="_blank" rel="noopener">

            Follow on Instagram
        </a>

        <a href="index-full.html" class="preview-link">Preview the full site &rarr;</a>
    </div>

    <div class="footer">
        &copy; 2026 Reeguez Rocks
    </div>
</body>
</html>
